<script>
const sb = supabase.createClient('https://pvkakagdizthpizykbqu.supabase.co', 'sb_publishable_8ZwrmJmmnxcsPcS2SInf6g_qfqJWs9P');
const base = location.href.substring(0, location.href.lastIndexOf('/'));
let initialized = false;

function togglePwd() {
  const el = document.getElementById('np');
  const isPwd = el.type === 'password';
  el.type = isPwd ? 'text' : 'password';
  document.getElementById('eye-icon').innerHTML = isPwd
    ? '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>'
    : '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
}

function showMsg(text, color) {
  const el = document.getElementById('msg');
  el.textContent = text; el.style.display = 'block'; el.style.color = color;
}

(async () => {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const accessToken = params.get('access_token');
  const refreshToken = params.get('refresh_token');
  if (accessToken && refreshToken) {
    const { error } = await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
    if (error) { location.href = base+'/expired-link.html'; return; }
    history.replaceState(null, '', window.location.pathname);
    initialized = true;
    document.addEventListener('keydown', function resetKey(e) { if (e.key === 'Enter' && document.getElementById('reset-form')) resetPassword(); });
  } else {
    const { data } = await sb.auth.getSession();
    if (data?.session) { initialized = true; history.replaceState(null, '', window.location.pathname); }
    else location.href = base+'/expired-link.html';
  }
})();

async function resetPassword() {
  if (!initialized) { showMsg('Session not ready. Please use the reset link from your email.', '#ba1a1a'); return; }
  const np = document.getElementById('np').value;
  const cp = document.getElementById('cp').value;
  if (!np || np.length < 6) { showMsg('Password must be at least 6 characters', '#ba1a1a'); return; }
  if (np !== cp) { showMsg('Passwords do not match', '#ba1a1a'); return; }
  const btn = document.getElementById('reset-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Updating...';
  try {
    const { error } = await sb.auth.updateUser({ password: np });
    if (error) { btn.disabled = false; btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6h2c0-1.66 1.34-3 3-3s3 1.34 3 3v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm0 12H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg> Reset Password'; showMsg(error.message, '#ba1a1a'); return; }
    document.getElementById('reset-form').innerHTML = '<p style="color:#22c55e;font-size:15px;line-height:1.6;">Your password has been changed successfully.</p><a href="'+base+'/#login" class="btn btn-primary" style="margin-top:16px;"><svg viewBox="0 0 24 24"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg> Continue to Login</a>';
  } catch (e) {
    btn.disabled = false; btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6h2c0-1.66 1.34-3 3-3s3 1.34 3 3v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm0 12H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg> Reset Password';
    showMsg(e.message || 'Something went wrong', '#ba1a1a');
  }
}
</script>
